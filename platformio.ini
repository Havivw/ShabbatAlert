    ; PlatformIO Project Configuration File
; Supports both ESP32 and ESP8266 builds

[platformio]
default_envs = esp8266mod
src_dir = src
data_dir = data

[env:esp32-wroom]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_ESP32=1
    -DUSE_OLED=1
lib_deps = 
    adafruit/Adafruit SSD1306@^2.5.9
    adafruit/Adafruit GFX Library@^1.11.9
    bblanchon/ArduinoJson@^7.0.4

[env:esp8266mod]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 230400
platform_packages =
    platformio/tool-esptoolpy@~2.40900.0
build_flags = 
    -DCORE_DEBUG_LEVEL=2
    -DBOARD_ESP8266=1
    -DUSE_OLED=0
lib_deps = 
    bblanchon/ArduinoJson@^7.0.4
    earlephilhower/ESP8266Audio

[env:esp8266-esp01]
platform = espressif8266
board = esp01_1m
framework = arduino
monitor_speed = 115200
build_flags = 
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_ESP8266=1
    -DUSE_OLED=0
    -DMINIMAL_BUILD=1
lib_deps = 
    bblanchon/ArduinoJson@^6.21.3

